<!DOCTYPE html>
<html>
<head>
  <title>Case studies | Lily Ekman</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" type="image/png" href="../src/favicon.ico" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-family: "Inter", sans-serif;
    }

    @supports (font-variation-settings: normal) {
      html {
        font-family: "Inter var", sans-serif;
      }
    }

    body {
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: left;
      gap: 12px;
    }

    .container-text {
      gap: 0;
    }

    .container-text h3:last-child {
      padding-top: 8px;
      border-top: 1px solid var(--color-dark);

    }

    input {
      padding: 10px 16px;
      background: none;
      border: 2px solid var(--color-dark);
      border-radius: 0;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      width: 100%;
    }

    input:hover {
      background-color: #E4E4E4;
    }

    button {
      padding: 10px 24px;
      background: var(--color-dark);
      color: var(--color-light);
      border: none;
      border-radius: 0;
      font-size: 16px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #404040;
    }

    .error {
      color: var(--color-highlight);
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="container container-text">
      <h1 class="section-title">Lily<br>Ekman</h1>
      <h3 class="section-description">Case studies</p>
    </div>
    <input type="password" id="password" placeholder="Password" />
    <button onclick="checkPassword()">Enter</button>
    <span class="error" id="error">Incorrect password, try again.</span>
  </div>

  <script>
    function checkPassword() {
      const input = document.getElementById('password').value;
      if (input === 'LilysWorkSamples2026') {
        window.location.href = '0NMNS3VQ98.html';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }

    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
</body>
</html>
